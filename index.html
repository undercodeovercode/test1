<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 48px;
            max-width: 480px;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #4a90d9;
            color: #fff;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
        }
        h1 {
            margin: 0 0 8px;
            color: #333;
            font-size: 28px;
        }
        .section {
            margin-top: 24px;
            text-align: left;
        }
        .section h2 {
            font-size: 18px;
            color: #4a90d9;
            margin-bottom: 8px;
        }
        .section p {
            font-size: 16px;
            color: #555;
            line-height: 1.6;
        }
        .hobby-tag {
            display: inline-block;
            background-color: #e8f0fe;
            color: #4a90d9;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">T</div>
        <h1>테스트</h1>
        <p>안녕하세요! 저는 <strong>테스트</strong>입니다.</p>
        <div class="section">
            <h2>취미</h2>
            <span class="hobby-tag">코딩</span>
        </div>
    </div>
</body>
</html>
