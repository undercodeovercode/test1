<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 자막 추출기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff0000, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #aaa;
            font-size: 16px;
        }

        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .input-section input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #333;
            border-radius: 12px;
            background-color: #1a1a1a;
            color: #f1f1f1;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-section input:focus {
            border-color: #ff4444;
        }

        .input-section input::placeholder {
            color: #666;
        }

        .btn-extract {
            padding: 14px 28px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            white-space: nowrap;
        }

        .btn-extract:hover {
            opacity: 0.9;
        }

        .btn-extract:active {
            transform: scale(0.97);
        }

        .btn-extract:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .language-select {
            margin-bottom: 24px;
            display: none;
        }

        .language-select label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        .language-select select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 12px;
            background-color: #1a1a1a;
            color: #f1f1f1;
            font-size: 15px;
            outline: none;
            cursor: pointer;
        }

        .language-select select:focus {
            border-color: #ff4444;
        }

        .status {
            text-align: center;
            padding: 16px;
            margin-bottom: 24px;
            border-radius: 12px;
            display: none;
            font-size: 15px;
        }

        .status.loading {
            display: block;
            background-color: #1a1a2e;
            color: #7aa2f7;
            border: 1px solid #2a2a4e;
        }

        .status.error {
            display: block;
            background-color: #2e1a1a;
            color: #f77a7a;
            border: 1px solid #4e2a2a;
        }

        .status.success {
            display: block;
            background-color: #1a2e1a;
            color: #7af77a;
            border: 1px solid #2a4e2a;
        }

        .video-info {
            display: none;
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #333;
        }

        .video-info .thumbnail {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .video-info .title {
            font-size: 18px;
            font-weight: 600;
            color: #f1f1f1;
        }

        .result-section {
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .result-actions {
            display: flex;
            gap: 8px;
        }

        .btn-copy, .btn-download {
            padding: 10px 20px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #f1f1f1;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-copy:hover, .btn-download:hover {
            background-color: #3a3a3a;
        }

        .btn-copy.copied {
            background-color: #1a4a1a;
            border-color: #2a6a2a;
            color: #7af77a;
        }

        .subtitle-options {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .subtitle-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }

        .subtitle-options input[type="checkbox"] {
            accent-color: #ff4444;
        }

        .subtitle-box {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            max-height: 500px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 15px;
            color: #ddd;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .subtitle-box::-webkit-scrollbar {
            width: 8px;
        }

        .subtitle-box::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 4px;
        }

        .subtitle-box::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .subtitle-line {
            padding: 4px 0;
        }

        .subtitle-line .timestamp {
            color: #ff6666;
            font-size: 13px;
            margin-right: 8px;
            font-family: monospace;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #7aa2f7;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 48px;
            color: #555;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .input-section {
                flex-direction: column;
            }

            .result-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>유튜브 자막 추출기</h1>
            <p>유튜브 영상 링크를 입력하면 자막(대본)을 추출합니다</p>
        </header>

        <div class="input-section">
            <input type="text" id="urlInput" placeholder="유튜브 링크를 붙여넣으세요 (예: https://www.youtube.com/watch?v=...)" />
            <button class="btn-extract" id="extractBtn" onclick="handleExtract()">추출하기</button>
        </div>

        <div class="language-select" id="languageSelect">
            <label for="langDropdown">자막 언어 선택:</label>
            <select id="langDropdown" onchange="handleLanguageChange()"></select>
        </div>

        <div class="status" id="status"></div>

        <div class="video-info" id="videoInfo">
            <img class="thumbnail" id="thumbnail" alt="썸네일" />
            <div class="title" id="videoTitle"></div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>추출된 자막</h2>
                <div class="result-actions">
                    <button class="btn-copy" id="copyBtn" onclick="copySubtitles()">복사하기</button>
                    <button class="btn-download" onclick="downloadSubtitles()">다운로드</button>
                </div>
            </div>

            <div class="subtitle-options">
                <label>
                    <input type="checkbox" id="showTimestamp" onchange="renderSubtitles()" />
                    타임스탬프 표시
                </label>
            </div>

            <div class="subtitle-box" id="subtitleBox"></div>
        </div>

        <footer>
            유튜브 자막 추출기 &mdash; 자막이 있는 영상에서만 추출할 수 있습니다
        </footer>
    </div>

    <script>
        let currentSubtitles = [];
        let captionTracks = [];
        let currentVideoId = '';

        // Invidious public instances (CORS-friendly YouTube frontend API)
        const INVIDIOUS_INSTANCES = [
            'https://inv.nadeko.net',
            'https://invidious.nerdvpn.de',
            'https://invidious.jing.rocks',
            'https://invidious.privacyredirect.com',
            'https://invidious.protokolla.fi',
            'https://iv.datura.network'
        ];

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function setStatus(type, message) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            if (type === 'loading') {
                el.innerHTML = '<span class="spinner"></span>' + message;
            } else {
                el.textContent = message;
            }
        }

        // Try fetching from multiple Invidious instances with fallback
        async function fetchFromInvidious(path) {
            const errors = [];
            for (const instance of INVIDIOUS_INSTANCES) {
                try {
                    const response = await fetch(`${instance}${path}`, {
                        signal: AbortSignal.timeout(8000)
                    });
                    if (response.ok) {
                        return { response, instance };
                    }
                    errors.push(`${instance}: HTTP ${response.status}`);
                } catch (e) {
                    errors.push(`${instance}: ${e.message}`);
                    continue;
                }
            }
            throw new Error('모든 서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
        }

        async function handleExtract() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                setStatus('error', '유튜브 링크를 입력해주세요.');
                return;
            }

            const videoId = extractVideoId(url);
            if (!videoId) {
                setStatus('error', '올바른 유튜브 링크가 아닙니다.');
                return;
            }

            currentVideoId = videoId;

            document.getElementById('extractBtn').disabled = true;
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('languageSelect').style.display = 'none';

            // Show video info with thumbnail
            document.getElementById('thumbnail').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            document.getElementById('videoInfo').style.display = 'block';
            document.getElementById('videoTitle').textContent = '';

            setStatus('loading', '영상 정보를 가져오는 중...');

            try {
                // Step 1: Fetch video info + captions list from Invidious API
                const { response: captionsResp, instance: workingInstance } =
                    await fetchFromInvidious(`/api/v1/captions/${videoId}`);
                const captionsData = await captionsResp.json();

                // Also fetch video title
                try {
                    const videoResp = await fetch(
                        `${workingInstance}/api/v1/videos/${videoId}?fields=title`,
                        { signal: AbortSignal.timeout(8000) }
                    );
                    if (videoResp.ok) {
                        const videoData = await videoResp.json();
                        document.getElementById('videoTitle').textContent = videoData.title || '';
                    }
                } catch (_) {
                    // Title fetch is non-critical, ignore errors
                }

                if (!captionsData.captions || captionsData.captions.length === 0) {
                    setStatus('error', '이 영상에는 자막이 없습니다.');
                    document.getElementById('extractBtn').disabled = false;
                    return;
                }

                // Store tracks with working instance info
                captionTracks = captionsData.captions.map(track => ({
                    label: track.label,
                    languageCode: track.language_code,
                    url: `${workingInstance}${track.url}`,
                }));

                // Populate language dropdown
                const dropdown = document.getElementById('langDropdown');
                dropdown.innerHTML = '';
                captionTracks.forEach((track, idx) => {
                    const option = document.createElement('option');
                    option.value = idx;
                    option.textContent = track.label;
                    dropdown.appendChild(option);
                });

                document.getElementById('languageSelect').style.display = 'block';

                // Auto-select Korean if available
                const koreanIdx = captionTracks.findIndex(t =>
                    t.languageCode === 'ko' || t.label.includes('한국어') || t.label.includes('Korean')
                );
                if (koreanIdx !== -1) {
                    dropdown.value = koreanIdx;
                }

                await loadSubtitles(dropdown.value);

            } catch (err) {
                setStatus('error', `오류가 발생했습니다: ${err.message}`);
            }

            document.getElementById('extractBtn').disabled = false;
        }

        async function handleLanguageChange() {
            const idx = document.getElementById('langDropdown').value;
            await loadSubtitles(idx);
        }

        async function loadSubtitles(trackIdx) {
            setStatus('loading', '자막을 불러오는 중...');

            try {
                const track = captionTracks[trackIdx];

                const response = await fetch(track.url, {
                    signal: AbortSignal.timeout(10000)
                });
                if (!response.ok) {
                    throw new Error(`자막 요청 실패 (HTTP ${response.status})`);
                }

                const xmlText = await response.text();
                currentSubtitles = parseSubtitleXml(xmlText);

                if (currentSubtitles.length === 0) {
                    setStatus('error', '자막이 비어 있습니다.');
                    return;
                }

                setStatus('success', `자막 ${currentSubtitles.length}개 항목을 추출했습니다.`);
                renderSubtitles();
                document.getElementById('resultSection').style.display = 'block';

            } catch (err) {
                setStatus('error', `자막을 불러오는 데 실패했습니다: ${err.message}`);
            }
        }

        function parseSubtitleXml(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'text/xml');
            const subtitles = [];

            // Handle standard YouTube XML format (<text start="" dur="">)
            const textElements = doc.querySelectorAll('text');
            if (textElements.length > 0) {
                textElements.forEach(el => {
                    const start = parseFloat(el.getAttribute('start') || '0');
                    const dur = parseFloat(el.getAttribute('dur') || '0');
                    let text = el.textContent || '';
                    text = decodeHtmlEntities(text).trim();
                    if (text) {
                        subtitles.push({ start, dur, text });
                    }
                });
                return subtitles;
            }

            // Handle srv3 format (<p t="" d="">)
            const pElements = doc.querySelectorAll('p');
            pElements.forEach(el => {
                const start = parseFloat(el.getAttribute('t') || '0') / 1000;
                const dur = parseFloat(el.getAttribute('d') || '0') / 1000;
                let text = el.textContent || '';
                text = decodeHtmlEntities(text).trim();
                if (text) {
                    subtitles.push({ start, dur, text });
                }
            });

            return subtitles;
        }

        function decodeHtmlEntities(str) {
            const textarea = document.createElement('textarea');
            textarea.innerHTML = str;
            return textarea.value;
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);

            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function renderSubtitles() {
            const box = document.getElementById('subtitleBox');
            const showTimestamp = document.getElementById('showTimestamp').checked;

            if (showTimestamp) {
                box.innerHTML = currentSubtitles.map(sub => {
                    return `<div class="subtitle-line"><span class="timestamp">[${formatTime(sub.start)}]</span>${escapeHtml(sub.text)}</div>`;
                }).join('');
            } else {
                box.innerHTML = '';
                box.textContent = currentSubtitles.map(sub => sub.text).join('\n');
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getPlainText() {
            const showTimestamp = document.getElementById('showTimestamp').checked;
            if (showTimestamp) {
                return currentSubtitles.map(sub => `[${formatTime(sub.start)}] ${sub.text}`).join('\n');
            }
            return currentSubtitles.map(sub => sub.text).join('\n');
        }

        async function copySubtitles() {
            const text = getPlainText();
            const btn = document.getElementById('copyBtn');

            try {
                await navigator.clipboard.writeText(text);
                btn.textContent = '복사 완료!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '복사하기';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);

                btn.textContent = '복사 완료!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '복사하기';
                    btn.classList.remove('copied');
                }, 2000);
            }
        }

        function downloadSubtitles() {
            const text = getPlainText();
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `subtitle_${currentVideoId}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Allow Enter key to trigger extraction
        document.getElementById('urlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleExtract();
            }
        });
    </script>
</body>
</html>
