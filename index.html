<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 자막 추출기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ff0000, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #aaa;
            font-size: 16px;
        }

        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .input-section input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #333;
            border-radius: 12px;
            background-color: #1a1a1a;
            color: #f1f1f1;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-section input:focus {
            border-color: #ff4444;
        }

        .input-section input::placeholder {
            color: #666;
        }

        .btn-extract {
            padding: 14px 28px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            white-space: nowrap;
        }

        .btn-extract:hover {
            opacity: 0.9;
        }

        .btn-extract:active {
            transform: scale(0.97);
        }

        .btn-extract:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .language-select {
            margin-bottom: 24px;
            display: none;
        }

        .language-select label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        .language-select select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #333;
            border-radius: 12px;
            background-color: #1a1a1a;
            color: #f1f1f1;
            font-size: 15px;
            outline: none;
            cursor: pointer;
        }

        .language-select select:focus {
            border-color: #ff4444;
        }

        .status {
            text-align: center;
            padding: 16px;
            margin-bottom: 24px;
            border-radius: 12px;
            display: none;
            font-size: 15px;
        }

        .status.loading {
            display: block;
            background-color: #1a1a2e;
            color: #7aa2f7;
            border: 1px solid #2a2a4e;
        }

        .status.error {
            display: block;
            background-color: #2e1a1a;
            color: #f77a7a;
            border: 1px solid #4e2a2a;
        }

        .status.success {
            display: block;
            background-color: #1a2e1a;
            color: #7af77a;
            border: 1px solid #2a4e2a;
        }

        .video-info {
            display: none;
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #333;
        }

        .video-info .thumbnail {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .video-info .title {
            font-size: 18px;
            font-weight: 600;
            color: #f1f1f1;
        }

        .result-section {
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .result-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .result-actions {
            display: flex;
            gap: 8px;
        }

        .btn-copy, .btn-download {
            padding: 10px 20px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #f1f1f1;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-copy:hover, .btn-download:hover {
            background-color: #3a3a3a;
        }

        .btn-copy.copied {
            background-color: #1a4a1a;
            border-color: #2a6a2a;
            color: #7af77a;
        }

        .subtitle-options {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .subtitle-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }

        .subtitle-options input[type="checkbox"] {
            accent-color: #ff4444;
        }

        .subtitle-box {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            max-height: 500px;
            overflow-y: auto;
            line-height: 1.8;
            font-size: 15px;
            color: #ddd;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .subtitle-box::-webkit-scrollbar {
            width: 8px;
        }

        .subtitle-box::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 4px;
        }

        .subtitle-box::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .subtitle-line {
            padding: 4px 0;
        }

        .subtitle-line .timestamp {
            color: #ff6666;
            font-size: 13px;
            margin-right: 8px;
            font-family: monospace;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #7aa2f7;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 48px;
            color: #555;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .input-section {
                flex-direction: column;
            }

            .result-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>유튜브 자막 추출기</h1>
            <p>유튜브 영상 링크를 입력하면 자막(대본)을 추출합니다</p>
        </header>

        <div class="input-section">
            <input type="text" id="urlInput" placeholder="유튜브 링크를 붙여넣으세요 (예: https://www.youtube.com/watch?v=...)" />
            <button class="btn-extract" id="extractBtn" onclick="handleExtract()">추출하기</button>
        </div>

        <div class="language-select" id="languageSelect">
            <label for="langDropdown">자막 언어 선택:</label>
            <select id="langDropdown" onchange="handleLanguageChange()"></select>
        </div>

        <div class="status" id="status"></div>

        <div class="video-info" id="videoInfo">
            <img class="thumbnail" id="thumbnail" alt="썸네일" />
            <div class="title" id="videoTitle"></div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>추출된 자막</h2>
                <div class="result-actions">
                    <button class="btn-copy" id="copyBtn" onclick="copySubtitles()">복사하기</button>
                    <button class="btn-download" onclick="downloadSubtitles()">다운로드</button>
                </div>
            </div>

            <div class="subtitle-options">
                <label>
                    <input type="checkbox" id="showTimestamp" onchange="renderSubtitles()" />
                    타임스탬프 표시
                </label>
            </div>

            <div class="subtitle-box" id="subtitleBox"></div>
        </div>

        <footer>
            유튜브 자막 추출기 &mdash; 자막이 있는 영상에서만 추출할 수 있습니다
        </footer>
    </div>

    <script>
        let currentSubtitles = [];
        let captionTracks = [];
        let currentVideoId = '';

        const CORS_PROXIES = [
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url=',
            'https://cors-anywhere.herokuapp.com/'
        ];

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function setStatus(type, message) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            if (type === 'loading') {
                el.innerHTML = '<span class="spinner"></span>' + message;
            } else {
                el.textContent = message;
            }
        }

        function clearStatus() {
            const el = document.getElementById('status');
            el.className = 'status';
            el.style.display = 'none';
        }

        async function fetchWithProxy(url) {
            for (const proxy of CORS_PROXIES) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(url));
                    if (response.ok) {
                        return await response.text();
                    }
                } catch (e) {
                    continue;
                }
            }
            throw new Error('모든 프록시 서버 요청이 실패했습니다.');
        }

        async function handleExtract() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                setStatus('error', '유튜브 링크를 입력해주세요.');
                return;
            }

            const videoId = extractVideoId(url);
            if (!videoId) {
                setStatus('error', '올바른 유튜브 링크가 아닙니다.');
                return;
            }

            currentVideoId = videoId;

            document.getElementById('extractBtn').disabled = true;
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('languageSelect').style.display = 'none';

            // Show video info
            const videoInfo = document.getElementById('videoInfo');
            document.getElementById('thumbnail').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            videoInfo.style.display = 'block';

            setStatus('loading', '자막 정보를 가져오는 중...');

            try {
                // Fetch the YouTube video page to extract caption tracks
                const pageHtml = await fetchWithProxy(`https://www.youtube.com/watch?v=${videoId}`);

                // Extract caption tracks from the page
                const captionRegex = /"captionTracks"\s*:\s*(\[.*?\])/;
                const match = pageHtml.match(captionRegex);

                if (!match) {
                    // Try alternative pattern
                    const altRegex = /captionTracks.*?(\[.*?\])/;
                    const altMatch = pageHtml.match(altRegex);
                    if (!altMatch) {
                        setStatus('error', '이 영상에는 자막이 없거나 자막을 가져올 수 없습니다.');
                        document.getElementById('extractBtn').disabled = false;
                        return;
                    }
                }

                // Extract title
                const titleMatch = pageHtml.match(/<title>(.*?)<\/title>/);
                if (titleMatch) {
                    let title = titleMatch[1].replace(' - YouTube', '').trim();
                    title = decodeHtmlEntities(title);
                    document.getElementById('videoTitle').textContent = title;
                }

                // Parse caption tracks
                let tracksJson;
                try {
                    const tracksStr = match[1];
                    tracksJson = JSON.parse(tracksStr);
                } catch (e) {
                    // Try to extract more carefully
                    const startIdx = pageHtml.indexOf('"captionTracks":');
                    if (startIdx === -1) {
                        setStatus('error', '자막 데이터를 파싱할 수 없습니다.');
                        document.getElementById('extractBtn').disabled = false;
                        return;
                    }
                    const bracketStart = pageHtml.indexOf('[', startIdx);
                    let depth = 0;
                    let bracketEnd = bracketStart;
                    for (let i = bracketStart; i < pageHtml.length; i++) {
                        if (pageHtml[i] === '[') depth++;
                        if (pageHtml[i] === ']') depth--;
                        if (depth === 0) {
                            bracketEnd = i + 1;
                            break;
                        }
                    }
                    try {
                        tracksJson = JSON.parse(pageHtml.substring(bracketStart, bracketEnd));
                    } catch (e2) {
                        setStatus('error', '자막 데이터를 파싱할 수 없습니다.');
                        document.getElementById('extractBtn').disabled = false;
                        return;
                    }
                }

                captionTracks = tracksJson;

                if (!captionTracks || captionTracks.length === 0) {
                    setStatus('error', '이 영상에는 사용 가능한 자막이 없습니다.');
                    document.getElementById('extractBtn').disabled = false;
                    return;
                }

                // Populate language dropdown
                const dropdown = document.getElementById('langDropdown');
                dropdown.innerHTML = '';
                captionTracks.forEach((track, idx) => {
                    const option = document.createElement('option');
                    option.value = idx;
                    const kind = track.kind === 'asr' ? ' (자동 생성)' : '';
                    option.textContent = `${track.name?.simpleText || track.languageCode}${kind}`;
                    dropdown.appendChild(option);
                });

                document.getElementById('languageSelect').style.display = 'block';

                // Auto-select Korean if available, otherwise first track
                const koreanIdx = captionTracks.findIndex(t => t.languageCode === 'ko');
                if (koreanIdx !== -1) {
                    dropdown.value = koreanIdx;
                }

                await loadSubtitles(dropdown.value);

            } catch (err) {
                setStatus('error', `오류가 발생했습니다: ${err.message}`);
            }

            document.getElementById('extractBtn').disabled = false;
        }

        async function handleLanguageChange() {
            const idx = document.getElementById('langDropdown').value;
            await loadSubtitles(idx);
        }

        async function loadSubtitles(trackIdx) {
            setStatus('loading', '자막을 불러오는 중...');

            try {
                const track = captionTracks[trackIdx];
                let subtitleUrl = track.baseUrl;

                // Ensure URL uses the XML format
                if (!subtitleUrl.includes('fmt=')) {
                    subtitleUrl += '&fmt=srv3';
                }

                const xmlText = await fetchWithProxy(subtitleUrl);
                currentSubtitles = parseSubtitleXml(xmlText);

                if (currentSubtitles.length === 0) {
                    setStatus('error', '자막이 비어 있습니다.');
                    return;
                }

                setStatus('success', `자막 ${currentSubtitles.length}개 항목을 추출했습니다.`);
                renderSubtitles();
                document.getElementById('resultSection').style.display = 'block';

            } catch (err) {
                setStatus('error', `자막을 불러오는 데 실패했습니다: ${err.message}`);
            }
        }

        function parseSubtitleXml(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'text/xml');
            const textElements = doc.querySelectorAll('text, p');
            const subtitles = [];

            textElements.forEach(el => {
                const start = parseFloat(el.getAttribute('start') || el.getAttribute('t') || '0') / (el.getAttribute('t') ? 1000 : 1);
                const dur = parseFloat(el.getAttribute('dur') || el.getAttribute('d') || '0') / (el.getAttribute('d') ? 1000 : 1);
                let text = el.textContent || '';
                text = decodeHtmlEntities(text).trim();

                if (text) {
                    subtitles.push({ start, dur, text });
                }
            });

            return subtitles;
        }

        function decodeHtmlEntities(str) {
            const textarea = document.createElement('textarea');
            textarea.innerHTML = str;
            return textarea.value;
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);

            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function renderSubtitles() {
            const box = document.getElementById('subtitleBox');
            const showTimestamp = document.getElementById('showTimestamp').checked;

            if (showTimestamp) {
                box.innerHTML = currentSubtitles.map(sub => {
                    return `<div class="subtitle-line"><span class="timestamp">[${formatTime(sub.start)}]</span>${escapeHtml(sub.text)}</div>`;
                }).join('');
            } else {
                box.innerHTML = '';
                box.textContent = currentSubtitles.map(sub => sub.text).join('\n');
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getPlainText() {
            const showTimestamp = document.getElementById('showTimestamp').checked;
            if (showTimestamp) {
                return currentSubtitles.map(sub => `[${formatTime(sub.start)}] ${sub.text}`).join('\n');
            }
            return currentSubtitles.map(sub => sub.text).join('\n');
        }

        async function copySubtitles() {
            const text = getPlainText();
            const btn = document.getElementById('copyBtn');

            try {
                await navigator.clipboard.writeText(text);
                btn.textContent = '복사 완료!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '복사하기';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);

                btn.textContent = '복사 완료!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '복사하기';
                    btn.classList.remove('copied');
                }, 2000);
            }
        }

        function downloadSubtitles() {
            const text = getPlainText();
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `subtitle_${currentVideoId}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Allow Enter key to trigger extraction
        document.getElementById('urlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                handleExtract();
            }
        });
    </script>
</body>
</html>
