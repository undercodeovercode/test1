<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 자막 추출기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }

        header { text-align: center; margin-bottom: 40px; }

        header h1 {
            font-size: 32px; font-weight: 700; margin-bottom: 8px;
            background: linear-gradient(135deg, #ff0000, #ff4444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p { color: #aaa; font-size: 16px; }

        .input-section { display: flex; gap: 12px; margin-bottom: 24px; }

        .input-section input {
            flex: 1; padding: 14px 18px; border: 2px solid #333;
            border-radius: 12px; background-color: #1a1a1a; color: #f1f1f1;
            font-size: 16px; outline: none; transition: border-color 0.2s;
        }
        .input-section input:focus { border-color: #ff4444; }
        .input-section input::placeholder { color: #666; }

        .btn-extract {
            padding: 14px 28px;
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: transform 0.1s, opacity 0.2s; white-space: nowrap;
        }
        .btn-extract:hover { opacity: 0.9; }
        .btn-extract:active { transform: scale(0.97); }
        .btn-extract:disabled { opacity: 0.5; cursor: not-allowed; }

        .language-select { margin-bottom: 24px; display: none; }
        .language-select label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        .language-select select {
            width: 100%; padding: 12px 16px; border: 2px solid #333;
            border-radius: 12px; background-color: #1a1a1a; color: #f1f1f1;
            font-size: 15px; outline: none; cursor: pointer;
        }
        .language-select select:focus { border-color: #ff4444; }

        .status {
            text-align: center; padding: 16px; margin-bottom: 24px;
            border-radius: 12px; display: none; font-size: 15px; line-height: 1.5;
        }
        .status.loading { display: block; background-color: #1a1a2e; color: #7aa2f7; border: 1px solid #2a2a4e; }
        .status.error   { display: block; background-color: #2e1a1a; color: #f77a7a; border: 1px solid #4e2a2a; }
        .status.success  { display: block; background-color: #1a2e1a; color: #7af77a; border: 1px solid #2a4e2a; }

        .video-info {
            display: none; background-color: #1a1a1a; border-radius: 12px;
            padding: 20px; margin-bottom: 24px; border: 1px solid #333;
        }
        .video-info .thumbnail { width: 100%; border-radius: 8px; margin-bottom: 12px; }
        .video-info .title { font-size: 18px; font-weight: 600; color: #f1f1f1; }

        .result-section { display: none; }
        .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .result-header h2 { font-size: 20px; font-weight: 600; }
        .result-actions { display: flex; gap: 8px; }

        .btn-copy, .btn-download {
            padding: 10px 20px; border: 1px solid #444; border-radius: 8px;
            background-color: #2a2a2a; color: #f1f1f1; font-size: 14px;
            cursor: pointer; transition: background-color 0.2s;
        }
        .btn-copy:hover, .btn-download:hover { background-color: #3a3a3a; }
        .btn-copy.copied { background-color: #1a4a1a; border-color: #2a6a2a; color: #7af77a; }

        .subtitle-options { display: flex; gap: 12px; margin-bottom: 16px; }
        .subtitle-options label { display: flex; align-items: center; gap: 6px; color: #aaa; font-size: 14px; cursor: pointer; }
        .subtitle-options input[type="checkbox"] { accent-color: #ff4444; }

        .subtitle-box {
            background-color: #1a1a1a; border: 1px solid #333; border-radius: 12px;
            padding: 24px; max-height: 500px; overflow-y: auto;
            line-height: 1.8; font-size: 15px; color: #ddd;
            white-space: pre-wrap; word-break: break-word;
        }
        .subtitle-box::-webkit-scrollbar { width: 8px; }
        .subtitle-box::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
        .subtitle-box::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        .subtitle-line { padding: 4px 0; }
        .subtitle-line .timestamp { color: #ff6666; font-size: 13px; margin-right: 8px; font-family: monospace; }

        .spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid #7aa2f7; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { text-align: center; margin-top: 48px; color: #555; font-size: 13px; }

        @media (max-width: 600px) {
            .input-section { flex-direction: column; }
            .result-header { flex-direction: column; gap: 12px; align-items: flex-start; }
            header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>유튜브 자막 추출기</h1>
            <p>유튜브 영상 링크를 입력하면 자막(대본)을 추출합니다</p>
        </header>

        <div class="input-section">
            <input type="text" id="urlInput" placeholder="유튜브 링크를 붙여넣으세요 (예: https://www.youtube.com/watch?v=...)" />
            <button class="btn-extract" id="extractBtn" onclick="handleExtract()">추출하기</button>
        </div>

        <div class="language-select" id="languageSelect">
            <label for="langDropdown">자막 언어 선택:</label>
            <select id="langDropdown" onchange="handleLanguageChange()"></select>
        </div>

        <div class="status" id="status"></div>

        <div class="video-info" id="videoInfo">
            <img class="thumbnail" id="thumbnail" alt="썸네일" />
            <div class="title" id="videoTitle"></div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>추출된 자막</h2>
                <div class="result-actions">
                    <button class="btn-copy" id="copyBtn" onclick="copySubtitles()">복사하기</button>
                    <button class="btn-download" onclick="downloadSubtitles()">다운로드</button>
                </div>
            </div>
            <div class="subtitle-options">
                <label>
                    <input type="checkbox" id="showTimestamp" onchange="renderSubtitles()" />
                    타임스탬프 표시
                </label>
            </div>
            <div class="subtitle-box" id="subtitleBox"></div>
        </div>

        <footer>
            유튜브 자막 추출기 &mdash; 자막이 있는 영상에서만 추출할 수 있습니다
        </footer>
    </div>

    <script>
        let currentSubtitles = [];
        let captionTracks = [];
        let currentVideoId = '';

        function extractVideoId(url) {
            const m = url.match(
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/
            );
            return m ? m[1] : null;
        }

        function setStatus(type, msg) {
            const el = document.getElementById('status');
            el.className = 'status ' + type;
            el.innerHTML = type === 'loading'
                ? '<span class="spinner"></span>' + escapeHtml(msg)
                : escapeHtml(msg);
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function decodeEntities(s) {
            const t = document.createElement('textarea');
            t.innerHTML = s;
            return t.value;
        }

        /* ── 메인 ── */
        async function handleExtract() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) { setStatus('error', '유튜브 링크를 입력해주세요.'); return; }

            const videoId = extractVideoId(url);
            if (!videoId) { setStatus('error', '올바른 유튜브 링크가 아닙니다.'); return; }

            currentVideoId = videoId;
            document.getElementById('extractBtn').disabled = true;
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('languageSelect').style.display = 'none';

            document.getElementById('thumbnail').src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
            document.getElementById('videoInfo').style.display = 'block';
            document.getElementById('videoTitle').textContent = '';

            setStatus('loading', '자막 정보를 가져오는 중...');

            try {
                const resp = await fetch(`/api/captions/${videoId}`);
                const data = await resp.json();

                if (!resp.ok) throw new Error(data.error || '서버 오류');

                if (data.title) {
                    document.getElementById('videoTitle').textContent = decodeEntities(data.title);
                }

                if (!data.tracks || data.tracks.length === 0) {
                    setStatus('error', '이 영상에는 자막이 없습니다.');
                    document.getElementById('extractBtn').disabled = false;
                    return;
                }

                captionTracks = data.tracks;

                // 드롭다운
                const dd = document.getElementById('langDropdown');
                dd.innerHTML = '';
                captionTracks.forEach((t, i) => {
                    const opt = document.createElement('option');
                    opt.value = i;
                    const auto = t.kind === 'asr' ? ' (자동 생성)' : '';
                    opt.textContent = t.label + auto;
                    dd.appendChild(opt);
                });
                document.getElementById('languageSelect').style.display = 'block';

                // 한국어 자동 선택
                const ki = captionTracks.findIndex(t => t.languageCode === 'ko');
                if (ki !== -1) dd.value = ki;

                await loadSubtitles(dd.value);
            } catch (err) {
                setStatus('error', '오류: ' + err.message);
            }

            document.getElementById('extractBtn').disabled = false;
        }

        async function handleLanguageChange() {
            await loadSubtitles(document.getElementById('langDropdown').value);
        }

        async function loadSubtitles(idx) {
            setStatus('loading', '자막 내용을 불러오는 중...');
            try {
                const track = captionTracks[idx];
                // 서버가 자막을 파싱하여 JSON 배열로 반환함
                const resp = await fetch(`/api/subtitle?url=${encodeURIComponent(track.baseUrl)}`);
                const data = await resp.json();

                if (data.error) throw new Error(data.error);

                currentSubtitles = data;

                if (currentSubtitles.length === 0) {
                    setStatus('error', '자막이 비어 있습니다.');
                    return;
                }

                setStatus('success', `자막 ${currentSubtitles.length}개 항목을 추출했습니다.`);
                renderSubtitles();
                document.getElementById('resultSection').style.display = 'block';
            } catch (err) {
                setStatus('error', '자막 로드 실패: ' + err.message);
            }
        }

        /* ── 표시 ── */
        function formatTime(sec) {
            const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
            return h > 0
                ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
                : `${m}:${String(s).padStart(2,'0')}`;
        }

        function renderSubtitles() {
            const box = document.getElementById('subtitleBox');
            const ts = document.getElementById('showTimestamp').checked;
            if (ts) {
                box.innerHTML = currentSubtitles.map(s =>
                    `<div class="subtitle-line"><span class="timestamp">[${formatTime(s.start)}]</span>${escapeHtml(s.text)}</div>`
                ).join('');
            } else {
                box.innerHTML = '';
                box.textContent = currentSubtitles.map(s => s.text).join('\n');
            }
        }

        function getPlainText() {
            const ts = document.getElementById('showTimestamp').checked;
            return currentSubtitles.map(s => ts ? `[${formatTime(s.start)}] ${s.text}` : s.text).join('\n');
        }

        async function copySubtitles() {
            const text = getPlainText(), btn = document.getElementById('copyBtn');
            try { await navigator.clipboard.writeText(text); }
            catch (_) {
                const ta = document.createElement('textarea');
                ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
                document.body.appendChild(ta); ta.select();
                document.execCommand('copy'); document.body.removeChild(ta);
            }
            btn.textContent = '복사 완료!'; btn.classList.add('copied');
            setTimeout(() => { btn.textContent = '복사하기'; btn.classList.remove('copied'); }, 2000);
        }

        function downloadSubtitles() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([getPlainText()], { type: 'text/plain;charset=utf-8' }));
            a.download = `subtitle_${currentVideoId}.txt`;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(a.href);
        }

        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleExtract();
        });
    </script>
</body>
</html>
